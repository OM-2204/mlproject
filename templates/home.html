<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Exam Performance Indicator</title>
    <style>
        body {
            background-color: #d3d3d3;
            font-family: "Times New Roman", serif;
        }
        h1 {
            font-size: 36px;
            font-weight: bold;
        }
        h2 {
            font-size: 32px;
            font-weight: bold;
        }
        label {
            display: inline-block;
            width: 220px;
            margin-bottom: 8px;
            font-size: 18px;
        }
        select, input {
            padding: 3px;
            font-size: 14px;
        }
        button {
            margin-top: 10px;
            padding: 5px 10px;
            font-size: 14px;
        }
        .result {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Student Exam Performance Indicator</h1>
    <h2>Student Exam Performance Prediction</h2>

    <form action="{{url_for('predict_datapoint')}}" method="POST">

        <div>
            <label>Gender</label>
            <select name="gender">
                <option>Select your Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div>
            <label>Race or Ethnicity</label>
            <select name="race_ethnicity">
                <option value="" disabled selected>Select Ethnicity</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div>
            <label>Parental Level of Education</label>
            <select name="parental_level_of_education">
                    <option value="" disabled selected>Select Parent Education</option>
                    <option value="high school">High School</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="master's degree">Master's Degree</option>
            </select>
        </div>

        <div>
            <label>Lunch Type</label>
            <select name="lunch">
                <option value="" disabled selected>Select Lunch Type</option>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free/Reduced</option>
            </select>
        </div>

        <div>
            <label>Test preparation Course</label>
           <select name="test_preparation_course">
                <option value="" disabled selected>Select Test_course</option>
                <option value="completed">Completed</option>
                <option value="none">None</option>
            </select>
        </div>

        <div>
            <label>Writing Score out of 100</label>
            <input type="number" name="writing_score" placeholder="Enter your number">
        </div>

        <div>
            <label>Reading Score out of 100</label>
            <input type="number" name="reading_score" placeholder="Enter your number">
        </div>

        <div>
            <button type="submit">Predict your Maths Score</button>
        </div>

    </form>

    <div class="result">
        THE prediction is {{results}}
    </div>

</body>
</html>
